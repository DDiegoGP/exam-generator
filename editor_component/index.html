<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: transparent; }

    #toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 3px;
      padding: 5px 8px;
      background: #f8f9fa;
      border: 1px solid #dee2e6;
      border-bottom: none;
      border-radius: 6px 6px 0 0;
      min-height: 36px;
    }
    .tb-btn {
      padding: 2px 8px;
      font-size: 12px;
      cursor: pointer;
      background: white;
      border: 1px solid #ced4da;
      border-radius: 3px;
      line-height: 1.5;
      color: #495057;
      white-space: nowrap;
    }
    .tb-btn:hover { background: #e8f4fd; border-color: #74b9ff; }
    .tb-btn:active { transform: translateY(1px); }
    .tb-mode { font-weight: 700; font-size: 11px; letter-spacing: 0.4px; padding: 2px 10px; }
    .mode-latex    { background: #2c3e50; color: #ecf0f1; border-color: #2c3e50; }
    .mode-latex:hover { background: #3d5166; border-color: #3d5166; }
    .mode-markdown { background: #27ae60; color: white; border-color: #27ae60; }
    .mode-markdown:hover { background: #2ecc71; border-color: #2ecc71; }
    .tb-sep { width: 1px; height: 18px; background: #dee2e6; margin: 0 3px; flex-shrink: 0; }

    /* Ace editor container */
    #ace-wrap {
      border: 1px solid #dee2e6;
      border-radius: 0 0 6px 6px;
      overflow: hidden;
    }
    #ace-editor { width: 100%; }

    /* Fallback textarea (shown if ace.js fails to load) */
    #fallback-wrap { display: none; border: 1px solid #dee2e6; border-radius: 0 0 6px 6px; }
    #fallback-ta {
      width: 100%; padding: 10px; font-size: 13px; font-family: monospace;
      border: none; outline: none; resize: vertical;
      background: white; color: #212529;
    }
  </style>
</head>
<body>

<div id="toolbar"></div>
<div id="ace-wrap"><div id="ace-editor"></div></div>
<div id="fallback-wrap"><textarea id="fallback-ta"></textarea></div>

<!-- Minimal Streamlit component protocol (no external CDN needed) -->
<script>
(function() {
  var _renderCallback = null;
  var _ready = false;

  window.StreamlitBridge = {
    setComponentReady: function() {
      window.parent.postMessage({ type: "streamlit:componentReady", apiVersion: 1 }, "*");
      _ready = true;
    },
    setComponentValue: function(value) {
      window.parent.postMessage({ type: "streamlit:componentValue", value: value, dataType: "json" }, "*");
    },
    setFrameHeight: function(height) {
      window.parent.postMessage({ type: "streamlit:setFrameHeight", height: height }, "*");
    },
    onRender: function(cb) { _renderCallback = cb; }
  };

  window.addEventListener("message", function(event) {
    if (!event.data || !event.data.type) return;
    if (event.data.type === "streamlit:render" && _renderCallback) {
      _renderCallback(event.data.args || {});
    }
  });
})();
</script>

<!-- Ace.js from cdnjs — blocked CDN gracefully falls back to textarea -->
<script>
window.ACE_CDN = "https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.3/";
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.3/ace.min.js"
        onerror="window._aceFailed=true"></script>

<script>
var SNIPPETS = {
  latex: [
    { label: 'B',         s: '\\textbf{TEXTO}',           t: 'Negrita  \\textbf{}' },
    { label: 'I',         s: '\\textit{TEXTO}',           t: 'Cursiva  \\textit{}' },
    { label: '$…$',       s: '$valor$',                   t: 'Fórmula inline' },
    { label: '\\[…\\]',   s: '\\[\n\\frac{a}{b}\n\\]',   t: 'Fórmula bloque' },
    { label: '½',         s: '\\frac{num}{den}',          t: 'Fracción  \\frac{}{}' },
    { label: '√',         s: '\\sqrt{x}',                 t: 'Raíz cuadrada' },
    { label: 'x²',        s: '^{2}',                      t: 'Superíndice ^{}' },
    { label: 'xₙ',        s: '_{n}',                      t: 'Subíndice _{}' },
    { label: '∑',         s: '\\sum_{i=1}^{n}',           t: 'Sumatorio' },
    { label: '∫',         s: '\\int_{a}^{b}',             t: 'Integral' },
    { label: 'α',         s: '\\alpha',                   t: 'Letra griega (escribe el nombre)' },
    { label: '→',         s: '\\rightarrow',              t: 'Flecha derecha' }
  ],
  markdown: [
    { label: 'B',         s: '**TEXTO**',                 t: 'Negrita' },
    { label: 'I',         s: '*TEXTO*',                   t: 'Cursiva' },
    { label: '$…$',       s: '$valor$',                   t: 'Fórmula inline' },
    { label: '$$…$$',     s: '$$\n\\frac{a}{b}\n$$',     t: 'Fórmula bloque' },
    { label: '½',         s: '$\\frac{num}{den}$',        t: 'Fracción' },
    { label: '√',         s: '$\\sqrt{x}$',               t: 'Raíz cuadrada' },
    { label: 'x²',        s: '^{2}',                      t: 'Superíndice (dentro de $)' },
    { label: '• lista',   s: '\n- elemento\n',            t: 'Lista con viñetas' },
    { label: '1. lista',  s: '\n1. elemento\n',           t: 'Lista numerada' },
    { label: '---',       s: '\n---\n',                   t: 'Separador horizontal' },
    { label: 'α',         s: '$\\alpha$',                 t: 'Letra griega' },
    { label: '→',         s: '$\\rightarrow$',            t: 'Flecha' }
  ]
};

var aceEditor = null;
var currentMode = 'latex';
var initialized = false;
var useAce = (typeof ace !== 'undefined' && !window._aceFailed);

/* ── Toolbar ── */
function buildToolbar() {
  var tb = document.getElementById('toolbar');
  tb.innerHTML = '';

  var modeBtn = document.createElement('button');
  modeBtn.className = 'tb-btn tb-mode mode-' + currentMode;
  modeBtn.textContent = currentMode === 'latex' ? '⚙ LaTeX' : '✍ Markdown';
  modeBtn.title = 'Cambiar entre modo LaTeX y Markdown';
  modeBtn.onclick = function() {
    currentMode = currentMode === 'latex' ? 'markdown' : 'latex';
    buildToolbar();
    if (useAce && aceEditor) {
      aceEditor.session.setMode('ace/mode/' + currentMode);
    }
    reportValue();
  };
  tb.appendChild(modeBtn);

  var sep = document.createElement('div');
  sep.className = 'tb-sep';
  tb.appendChild(sep);

  SNIPPETS[currentMode].forEach(function(item) {
    var btn = document.createElement('button');
    btn.className = 'tb-btn';
    btn.textContent = item.label;
    btn.title = item.t;
    btn.onclick = function() { insertSnippet(item.s); };
    tb.appendChild(btn);
  });
}

function insertSnippet(snippet) {
  if (useAce && aceEditor) {
    aceEditor.insert(snippet);
    aceEditor.focus();
  } else {
    var ta = document.getElementById('fallback-ta');
    var start = ta.selectionStart, end = ta.selectionEnd;
    var val = ta.value;
    ta.value = val.slice(0, start) + snippet + val.slice(end);
    ta.selectionStart = ta.selectionEnd = start + snippet.length;
    ta.focus();
    reportValue();
  }
}

/* ── Report value to Streamlit ── */
function reportValue() {
  var content = useAce && aceEditor ? aceEditor.getValue()
                                    : document.getElementById('fallback-ta').value;
  window.StreamlitBridge.setComponentValue({ content: content, mode: currentMode });
}

/* ── Init ── */
function init(args) {
  var val    = args.value  !== undefined ? args.value  : '';
  var mode   = args.mode   !== undefined ? args.mode   : 'latex';
  var height = args.height !== undefined ? args.height : 200;

  currentMode = mode;

  if (useAce) {
    ace.config.set('basePath', window.ACE_CDN);
    var edDiv = document.getElementById('ace-editor');
    edDiv.style.height = height + 'px';

    aceEditor = ace.edit('ace-editor');
    aceEditor.setTheme('ace/theme/github');
    aceEditor.session.setMode('ace/mode/' + currentMode);
    aceEditor.setOptions({
      fontSize: '13px',
      showPrintMargin: false,
      wrap: true,
      highlightActiveLine: true,
      tabSize: 2
    });
    aceEditor.setValue(val, -1);
    aceEditor.on('change', reportValue);
  } else {
    // Fallback textarea
    document.getElementById('ace-wrap').style.display = 'none';
    document.getElementById('fallback-wrap').style.display = 'block';
    var ta = document.getElementById('fallback-ta');
    ta.style.height = height + 'px';
    ta.value = val;
    ta.addEventListener('input', reportValue);
  }

  buildToolbar();
  window.StreamlitBridge.setFrameHeight(height + 44);
}

function onRender(args) {
  if (!initialized) {
    initialized = true;
    init(args);
  } else {
    var newVal  = args.value  !== undefined ? args.value  : '';
    var newMode = args.mode   !== undefined ? args.mode   : 'latex';

    if (useAce && aceEditor) {
      if (newVal !== aceEditor.getValue()) {
        aceEditor.setValue(newVal, -1);
      }
      if (newMode !== currentMode) {
        currentMode = newMode;
        aceEditor.session.setMode('ace/mode/' + currentMode);
        buildToolbar();
      }
    } else {
      var ta = document.getElementById('fallback-ta');
      if (newVal !== ta.value) ta.value = newVal;
    }
  }
}

window.StreamlitBridge.onRender(onRender);
window.StreamlitBridge.setComponentReady();
</script>

</body>
</html>
